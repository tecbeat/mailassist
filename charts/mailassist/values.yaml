# =============================================================================
# MailAssist Helm Chart — Default Values
# =============================================================================
# Refer to the README or design document for detailed descriptions.
# Override these values in your own values file or via --set flags.
# =============================================================================

# =============================================================================
# Image-Konfiguration
# =============================================================================
image:
  repository: hub.teccave.de/tecbeat/mailassist
  tag: ""  # Defaults to Chart.appVersion — set by CI/CD pipeline
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# =============================================================================
# App Deployment (FastAPI Webserver)
# =============================================================================
app:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Worker Deployment (ARQ Background Worker)
# =============================================================================
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  livenessProbe:
    exec:
      command:
        - sh
        - -c
        - "python -c \"import redis; r=redis.from_url('$VALKEY_URL'); assert r.ping()\""
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - sh
        - -c
        - "python -c \"import redis; r=redis.from_url('$VALKEY_URL'); assert r.ping()\""
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Migration Job
# =============================================================================
migration:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 8000
  # -- Statische IP für LoadBalancer (z.B. MetalLB).
  # -- Nur wirksam bei service.type: LoadBalancer.
  # loadBalancerIP: "192.168.1.100"
  loadBalancerIP: ""
  # -- External Traffic Policy: "Local" (Client-IP erhalten) oder "Cluster" (gleichmäßig verteilen).
  # -- Nur relevant bei service.type: LoadBalancer oder NodePort.
  # externalTrafficPolicy: "Local"
  externalTrafficPolicy: ""
  # -- CIDR-Bereiche, die auf den LoadBalancer zugreifen dürfen.
  # loadBalancerSourceRanges:
  #   - "10.0.0.0/8"
  #   - "192.168.1.0/24"
  loadBalancerSourceRanges: []

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mailer.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mailer-tls
  #    hosts:
  #      - mailer.example.com

# =============================================================================
# ServiceAccount
# =============================================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # Bestehendes Secret verwenden statt ein neues zu erstellen
  existingSecret: ""
  # Werte für das generierte Secret (nur wenn existingSecret leer ist)
  appSecretKey: ""
  appSecretKeyOld: ""
  postgresPassword: ""
  valkeyPassword: ""
  oidcClientSecret: ""

# =============================================================================
# Anwendungskonfiguration (ConfigMap)
# =============================================================================
config:
  # -- Anwendung
  appName: "MailAssist"
  debug: "false"

  # -- OIDC / SSO
  oidcIssuerUrl: ""
  oidcClientId: ""
  oidcRedirectUri: ""
  oidcScopes: "openid email profile"

  # -- CORS
  corsAllowedOrigins: ""

  # -- Session
  sessionTtlSeconds: "86400"

  # -- Rate Limiting
  authRateLimit: "10"
  apiRateLimit: "100"

  # -- AI
  aiMaxTokens: "1024"
  aiTemperature: "0.3"
  aiTimeoutSeconds: "120"
  aiTokenUsageTtlDays: "90"
  aiPauseCooldownSeconds: "120"

  # -- Mail / IMAP
  imapTimeoutSeconds: "30"
  imapPauseCooldownSeconds: "300"
  maxEmailBodySize: "51200"
  maxJobsPerUserPerMinute: "20"

  # -- Polling
  pollConcurrency: "5"
  pollInitialScanBatch: "500"

  # -- Caching
  contactCacheTtlSeconds: "3600"
  imapFolderCacheTtlSeconds: "120"

  # -- Contact Sync
  contactSyncMaxErrors: "10"

  # -- Database Pool
  dbPoolSize: "10"
  dbMaxOverflow: "20"
  dbPoolRecycle: "1800"

  # -- Worker
  workerMaxJobs: "10"
  workerJobTimeout: "600"

  # -- Scheduler
  schedulerMaxBatch: "500"
  schedulerReservedSlots: "2"
  schedulerDefaultMaxConcurrent: "3"

  # -- Health Monitoring
  heartbeatTtlSeconds: "600"
  staleJobThresholdSeconds: "660"
  providerRecoveryCooldownSeconds: "600"
  cronLastRunTtlSeconds: "3600"
  probeTimeoutSeconds: "10"

  # -- Pipeline
  pipelineProgressTtlSeconds: "300"
  approvalExpiryDays: "7"

  # -- Cron
  cronIntervalMinutes: "10"

  # -- Draft Cleanup
  draftExpiryDays: "7"
  draftSentFolderNames: "Sent,INBOX.Sent,Sent Messages,Sent Items"
  draftFolderNames: "Drafts,INBOX.Drafts,Draft"
  draftLookbackDays: "14"
  draftMaxSentScan: "100"

  # -- Calendar
  icalProductId: "-//MailAssist//EN"

  # -- Rules Engine
  rulesMaxPatternLength: "500"
  rulesMaxTextLength: "51200"

  # -- Valkey Timeouts
  valkeySocketTimeout: "5.0"
  valkeySocketConnectTimeout: "3.0"

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7"
    pullPolicy: IfNotPresent
  auth:
    database: mailer
    username: mailer
    # Passwort wird aus secrets.postgresPassword bezogen
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    exec:
      command:
        - pg_isready
        - -U
        - mailer
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  livenessProbe:
    exec:
      command:
        - pg_isready
        - -U
        - mailer
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

# Externe Datenbank (wenn postgresql.enabled: false)
externalDatabase:
  url: ""

# =============================================================================
# Valkey
# =============================================================================
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5"
    pullPolicy: IfNotPresent
  config:
    maxmemory: "128mb"
    maxmemoryPolicy: "allkeys-lru"
    appendonly: "yes"
  persistence:
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  readinessProbe:
    exec:
      command:
        - sh
        - -c
        - "valkey-cli -a $VALKEY_PASSWORD ping"
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  livenessProbe:
    exec:
      command:
        - sh
        - -c
        - "valkey-cli -a $VALKEY_PASSWORD ping"
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

# Externe Valkey-Instanz (wenn valkey.enabled: false)
externalValkey:
  url: ""

# =============================================================================
# Ollama (nur externe Verbindung)
# =============================================================================
ollama:
  enabled: false
  url: ""

# =============================================================================
# NetworkPolicy
# =============================================================================
networkPolicy:
  enabled: false
