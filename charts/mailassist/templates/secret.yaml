{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mailassist.fullname" . }}
  labels:
    {{- include "mailassist.labels" . | nindent 4 }}
type: Opaque
data:
  APP_SECRET_KEY: {{ required "secrets.appSecretKey is required when not using existingSecret" .Values.secrets.appSecretKey | b64enc | quote }}
  {{- if .Values.secrets.appSecretKeyOld }}
  APP_SECRET_KEY_OLD: {{ .Values.secrets.appSecretKeyOld | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when postgresql.enabled is true and not using existingSecret" .Values.secrets.postgresPassword | b64enc | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.valkey.enabled }}
  VALKEY_PASSWORD: {{ required "secrets.valkeyPassword is required when valkey.enabled is true and not using existingSecret" .Values.secrets.valkeyPassword | b64enc | quote }}
  {{- else }}
  VALKEY_PASSWORD: {{ .Values.secrets.valkeyPassword | b64enc | quote }}
  {{- end }}
  OIDC_CLIENT_SECRET: {{ required "secrets.oidcClientSecret is required when not using existingSecret" .Values.secrets.oidcClientSecret | b64enc | quote }}
  # -- Connection URLs (contain passwords, must stay in Secret)
  DATABASE_URL: {{ include "mailassist.databaseUrl" . | b64enc | quote }}
  VALKEY_URL: {{ include "mailassist.valkeyUrl" . | b64enc | quote }}
{{- end }}
