{{- if .Values.networkPolicy.enabled }}
{{/* ---- App NetworkPolicy ---- */}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mailassist.fullname" . }}-app
  labels:
    {{- include "mailassist.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  podSelector:
    matchLabels:
      {{- include "mailassist.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
---
{{/* ---- PostgreSQL NetworkPolicy ---- */}}
{{- if .Values.postgresql.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mailassist.postgresql.fullname" . }}
  labels:
    {{- include "mailassist.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  podSelector:
    matchLabels:
      {{- include "mailassist.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "mailassist.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
        - podSelector:
            matchLabels:
              {{- include "mailassist.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: worker
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
---
{{/* ---- Valkey NetworkPolicy ---- */}}
{{- if .Values.valkey.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mailassist.valkey.fullname" . }}
  labels:
    {{- include "mailassist.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  podSelector:
    matchLabels:
      {{- include "mailassist.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: valkey
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "mailassist.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
        - podSelector:
            matchLabels:
              {{- include "mailassist.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: worker
      ports:
        - port: 6379
          protocol: TCP
{{- end }}
{{- end }}
