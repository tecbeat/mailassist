# =============================================================================
# CI Test Values — Existing Secret
# =============================================================================
# References an externally managed Kubernetes Secret instead of creating one.
# Validates that the chart renders correctly when `secrets.existingSecret` is
# set: no Secret resource should be created, and all Deployments/Jobs should
# reference the external secret name.
# =============================================================================

# =============================================================================
# Secrets — Use an existing external secret
# =============================================================================
secrets:
  existingSecret: "mailassist-external-secret"
  # Individual secret values (appSecretKey, oidcClientSecret, etc.) are NOT set
  # because the external secret provides them.
  # The external secret MUST contain the following keys:
  #   APP_SECRET_KEY, POSTGRES_PASSWORD, VALKEY_PASSWORD,
  #   OIDC_CLIENT_SECRET, DATABASE_URL, VALKEY_URL

# =============================================================================
# Config — Required values
# =============================================================================
config:
  oidcIssuerUrl: "https://sso.example.com"
  oidcClientId: "mailassist-ci"
  oidcRedirectUri: "https://mail.example.com/auth/callback"
  corsAllowedOrigins: "https://mail.example.com"
