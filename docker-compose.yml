---
services:
  mailassist:
    image: hub.teccave.de/tecbeat/mailassist:${VERSION}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mailer:${POSTGRES_PASSWORD}@postgres:5432/mailer
      - VALKEY_URL=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    image: hub.teccave.de/tecbeat/mailassist:${VERSION}
    command: ["worker"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://mailer:${POSTGRES_PASSWORD}@postgres:5432/mailer
      - VALKEY_URL=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - APP_SECRET_KEY=${APP_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "arq", "--check", "app.workers.worker.WorkerSettings"]
      interval: 30s
      timeout: 10s
      retries: 3
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    environment:
      - POSTGRES_USER=mailer
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mailer
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
    command: >
      valkey-server
      --requirepass ${VALKEY_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "--no-auth-warning", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
