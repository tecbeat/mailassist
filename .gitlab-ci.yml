---
include:
  - project: 'maintenance/teccave_pipeline'
    ref: main
    file: '/.pipeline_defs/.build_image.yml'

templater:
  rules:
    - when: never

render_pages:
  stage: prepare
  image: node:22-slim
  needs: []
  script:
    - cd docs && npm ci && npx docusaurus build --out-dir ../public
  artifacts:
    paths:
      - public
    expire_in: 1 day
  tags:
    - teccave

backend_unittest:
  stage: unittest
  image: python:3.14-slim@sha256:5b3879b6f3cb77e712644d50262d05a7c146b7312d784a18eff7ff5462e77033
  needs: []
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
      when: on_success
    - when: never
  before_script:
    - pip install --no-cache-dir uv
  script:
    - cd backend
    - uv venv .venv
    - uv pip compile pyproject.toml --extra dev -o /tmp/requirements.txt
    - uv pip install --python .venv/bin/python -r /tmp/requirements.txt
    - PYTHONPATH=. .venv/bin/python -m pytest tests/ -v --cov=app --cov-report=term-missing:skip-covered --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=38
  artifacts:
    paths:
      - backend/htmlcov/
      - backend/coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always
    expire_in: 7 days
  coverage: '/(?i)total.*?(\d+(?:\.\d+)?\%)/'
  tags:
    - teccave

frontend_unittest:
  stage: unittest
  image: node:24-alpine
  needs: []
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
      when: on_success
    - when: never
  script:
    - cd frontend
    - npm ci --ignore-scripts
    - npx tsc --noEmit
    - npx vitest run
  tags:
    - teccave

helm_lint:
  stage: lint
  image:
    name: alpine/helm:3.17.3
    entrypoint: [""]
  needs: []
  tags:
    - teccave
  script:
    - helm lint charts/mailassist/
    - helm lint charts/mailassist/ -f charts/mailassist/ci/default-values.yaml
    - helm lint charts/mailassist/ -f charts/mailassist/ci/full-values.yaml
    - helm lint charts/mailassist/ -f charts/mailassist/ci/external-db-values.yaml
    - helm lint charts/mailassist/ -f charts/mailassist/ci/existing-secret-values.yaml
    - helm template test charts/mailassist/ --debug > /dev/null
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
      when: on_success
    - when: never

integration_systemtest:
  stage: systemtest
  image:
    name: ${CI_REGISTRY_IMAGE}:${VERSION}
    entrypoint: [""]
  needs:
    - job: versioner
      artifacts: true
    - job: test_build_image
      artifacts: false
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
      when: on_success
    - when: never
  services:
    - name: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
      alias: postgres
    - name: valkey/valkey:9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
      alias: valkey
  variables:
    POSTGRES_USER: mailassist
    POSTGRES_PASSWORD: mailassist
    POSTGRES_DB: mailassist
    DATABASE_URL: "postgresql+asyncpg://mailassist:mailassist@postgres:5432/mailassist"
    VALKEY_URL: "redis://valkey:6379/0"
    APP_SECRET_KEY: "ci-integration-test-secret-key-min-32-chars-long"
  script:
    - echo "Starting application..."
    - cd /app
    - docker-entrypoint.sh app &
    - APP_PID=$!
    - OK=0
    - |
      for i in $(seq 1 60); do
        CODE=$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:8000/health" || echo "000")
        echo "[$i] /health -> ${CODE}"
        if [ "$CODE" = "200" ]; then
          OK=1
          break
        fi
        sleep 1
      done
    - kill "$APP_PID" 2>/dev/null || true
    - if [ "$OK" != "1" ]; then echo "App did not return 200 from /health within 60s"; exit 1; fi
    - echo "Integration test passed."
  tags:
    - teccave

updater:
  needs:
    - job: versioner
      artifacts: false
    - job: templater
      artifacts: true
      optional: true
    - job: changelogger
      artifacts: true
    - job: releaser
      artifacts: false

cleanup_image:
  needs:
    - job: versioner
      artifacts: true
    - job: test_build_image
      artifacts: false
    - job: integration_systemtest
      artifacts: false
    - job: cleanup_lxc
      artifacts: false
      optional: true
